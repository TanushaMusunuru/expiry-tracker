<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Expiry Tracker</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- jQuery + SweetAlert -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Custom CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-light d-flex align-items-center justify-content-center vh-100">

<!-- FLASH -->
{% with messages = get_flashed_messages() %}
{% if messages %}
{% set parts = messages[0].split('|') %}
<script>
  document.addEventListener('DOMContentLoaded', function () {
    Swal.fire({
      icon: '{{ parts[1] if parts|length > 1 else "info" }}',
      title: '{{ parts[0] }}',
      timer: 2000,
      showConfirmButton: false
    });
  });
</script>
{% endif %}
{% endwith %}

<!-- REGISTER CARD -->
<div class="card shadow p-4" style="max-width: 420px; width: 100%;">

  <div class="text-center mb-3">
    <h3 class="fw-bold">✨ Create account</h3>
    <p class="text-muted small">Start tracking your items for free</p>
  </div>

  <form id="register-form" method="POST" action="{{ url_for('register_submit') }}">

    <div class="mb-3">
      <label class="form-label">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        class="form-control"
        placeholder="Choose a username"
        minlength="3"
        required>
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input
        type="password"
        id="password"
        name="password"
        class="form-control"
        placeholder="Create a strong password"
        required>

      <!-- Strength UI -->
      <div class="progress mt-2" style="height:6px;">
        <div id="pw-bar" class="progress-bar"></div>
      </div>
      <small id="pw-hint" class="text-muted"></small>
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        class="form-control"
        placeholder="you@example.com"
        required>
      <small class="text-muted">Used for expiry alerts.</small>
    </div>

    <button type="submit" class="btn btn-primary w-100">
      Create Account →
    </button>

  </form>

  <div class="text-center mt-3 small">
    Already have an account?
    <a href="{{ url_for('auth') }}" class="text-decoration-none">Sign in</a>
  </div>

</div>

<!-- JS -->
<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
